<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Agenda"/>
<meta name="theme-color" content="#0C0C0C"/>
<title>Agenda Pessoal</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#0C0C0C}
body{color:#F0F0F0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
input,select,button{font-family:inherit}
input,select{background:#272727;border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#F0F0F0;padding:8px 12px;font-size:14px;width:100%;outline:none;-webkit-appearance:none}
select{appearance:none}
select option{background:#1E1E1E}
*{-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}
#root{padding-bottom:env(safe-area-inset-bottom)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script>
window.storage={get:async k=>{const v=localStorage.getItem(k);return v!==null?{value:v}:null},set:async(k,v)=>{localStorage.setItem(k,String(v));return{key:k,value:v}}};
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;
const BG="#0C0C0C",S0="#161616",S1="#1E1E1E",S2="#272727",BD="rgba(255,255,255,0.07)",BD2="rgba(255,255,255,0.13)",TX="#F0F0F0",MU="#606060",AC="#8479F0",R="18px",RM="12px",RS="8px";
const PALETTE=["#9B8FFF","#34D399","#FB923C","#FBBF24","#60A5FA","#F472B6","#A3E635","#38BDF8","#C084FC","#94A3B8","#F87171","#2DD4BF"];
const DAY_NAMES=["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];
const WATER_TIMES=["07:30","09:30","11:30","13:30","15:30","17:30","19:30"];
const TODAY=()=>new Date().toISOString().slice(0,10);
const inp={background:S2,border:"1px solid "+BD,borderRadius:RS,color:TX,padding:"8px 12px",fontSize:14,width:"100%",boxSizing:"border-box",outline:"none"};
const cardS={background:S0,border:"1px solid "+BD,borderRadius:R,padding:"1rem 1.25rem"};
const Btn=(a,d)=>({padding:"6px 14px",fontSize:12,cursor:"pointer",borderRadius:RM,border:"1px solid "+(d?"rgba(251,146,60,0.25)":a?AC:BD2),background:a?AC:d?"rgba(251,146,60,0.08)":"transparent",color:d?"#FB923C":a?TX:MU,fontWeight:a?500:400});
const DEFAULT_CATS=[{id:"c1",name:"Pessoal",color:"#9B8FFF"},{id:"c2",name:"Trabalho",color:"#34D399"},{id:"c3",name:"Saude",color:"#FB923C"},{id:"c4",name:"Casa",color:"#FBBF24"},{id:"c5",name:"Estudo",color:"#60A5FA"},{id:"c6",name:"Alimentacao",color:"#F472B6"}];
const DEFAULT_RECURRING=[{id:"r1",text:"Trabalhar",cat:"Trabalho",prio:"alta",timeStart:"08:15",timeEnd:"17:30",days:[1,2,3,4,5],goesToPending:false},{id:"r2",text:"Lanche",cat:"Alimentacao",prio:"normal",timeStart:"09:45",timeEnd:"",days:[1,2,3,4,5],goesToPending:false},{id:"r3",text:"Almoco",cat:"Alimentacao",prio:"normal",timeStart:"12:30",timeEnd:"13:00",days:[1,2,3,4,5],goesToPending:false},{id:"r4",text:"Skin-care manha",cat:"Saude",prio:"alta",timeStart:"07:15",timeEnd:"",days:[0,1,2,3,4,5,6],goesToPending:true},{id:"r5",text:"Skin-care noite",cat:"Saude",prio:"alta",timeStart:"21:00",timeEnd:"",days:[0,1,2,3,4,5,6],goesToPending:true},...WATER_TIMES.map((t,i)=>({id:"rw"+i,text:"Beber agua",cat:"Saude",prio:"normal",timeStart:t,timeEnd:"",days:[0,1,2,3,4,5,6],goesToPending:false}))];
function catColor(cats,name){return cats.find(c=>c.name===name)?.color||"#888";}
function injectRecurring(tasks,recurring){const today=TODAY(),wd=new Date().getDay();const exist=tasks.filter(t=>t.date===today&&t.recurId).map(t=>t.recurId);const toAdd=recurring.filter(r=>r.days.includes(wd)&&!exist.includes(r.id)).map(r=>({id:r.id+"_"+today,text:r.text,cat:r.cat,prio:r.prio,timeStart:r.timeStart,timeEnd:r.timeEnd,done:false,date:today,recurId:r.id,goesToPending:r.goesToPending}));return toAdd.length?[...tasks,...toAdd]:tasks;}
function checkPending(tasks,pending){const yest=new Date();yest.setDate(yest.getDate()-1);const yKey=yest.toISOString().slice(0,10);const existIds=pending.map(p=>p.originalId);const newP=tasks.filter(t=>t.date===yKey&&t.goesToPending&&!t.done&&!existIds.includes(t.id)).map(t=>({...t,id:"p_"+t.id,originalId:t.id,pendingFrom:yKey}));return [...pending,...newP];}
function getStreak(h){let s=0;const d=new Date();d.setHours(0,0,0,0);for(let i=0;i<30;i++){const k=d.toISOString().slice(0,10),e=h[k];if(e&&e.total>0&&e.done/e.total>=0.5)s++;else if(k!==TODAY())break;d.setDate(d.getDate()-1);}return s;}
function getLast7(h){const d=new Date();d.setHours(0,0,0,0);return Array.from({length:7},(_,i)=>{const dd=new Date(d);dd.setDate(d.getDate()-(6-i));const k=dd.toISOString().slice(0,10),e=h[k],pct=e&&e.total>0?Math.round(e.done/e.total*100):0;return{k,label:dd.toLocaleDateString("pt-PT",{weekday:"short"}).replace(".",""),pct,isToday:k===TODAY()};});}
function Toggle({on,onChange}){return(<button onClick={onChange} style={{width:42,height:24,borderRadius:99,border:"none",cursor:"pointer",background:on?AC:S2,position:"relative",flexShrink:0}}><div style={{width:18,height:18,borderRadius:"50%",background:on?TX:"rgba(255,255,255,0.25)",position:"absolute",top:3,left:on?21:3,transition:"left .2s"}}/></button>);}
function DayPicker({days,onChange}){return(<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{DAY_NAMES.map((d,i)=><button key={i} onClick={()=>onChange(days.includes(i)?days.filter(x=>x!==i):[...days,i].sort())} style={{padding:"4px 9px",fontSize:12,cursor:"pointer",borderRadius:RM,border:"1px solid "+(days.includes(i)?AC:BD),background:days.includes(i)?AC:"transparent",color:days.includes(i)?TX:MU}}>{d}</button>)}</div>);}
function ColorPicker({value,onChange}){return(<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{PALETTE.map(col=><div key={col} onClick={()=>onChange(col)} style={{width:24,height:24,borderRadius:"50%",background:col,cursor:"pointer",border:value===col?"2px solid "+TX:"2px solid transparent"}}/>)}</div>);}
const Pill=({text,color})=><span style={{fontSize:11,padding:"2px 8px",borderRadius:99,background:color+"22",color,fontWeight:500}}>{text}</span>;


function App(){
const[tasks,setTasks]=useState([]);
const[recurring,setRecurring]=useState(DEFAULT_RECURRING);
const[categories,setCategories]=useState(DEFAULT_CATS);
const[profile,setProfile]=useState({name:"",notifWater:true,notifMeals:true,notifSkincare:true});
const[history,setHistory]=useState({});
const[pending,setPending]=useState([]);
const[view,setView]=useState("hoje");
const[notifStatus,setNotifStatus]=useState("unknown");
const[now,setNow]=useState(new Date());
const[loaded,setLoaded]=useState(false);
const[showNewTask,setShowNewTask]=useState(false);
const[showNewRecur,setShowNewRecur]=useState(false);
const[showNewCat,setShowNewCat]=useState(false);
const[editTaskId,setEditTaskId]=useState(null);
const[editRecurId,setEditRecurId]=useState(null);
const[editCatId,setEditCatId]=useState(null);
const blankTask=()=>({text:"",cat:categories[0]?.name||"Pessoal",prio:"normal",timeStart:"",timeEnd:"",date:TODAY()});
const[taskForm,setTaskForm]=useState(blankTask());
const[recurForm,setRecurForm]=useState({text:"",cat:"Trabalho",prio:"normal",timeStart:"09:00",timeEnd:"",days:[1,2,3,4,5],goesToPending:false});
const[catForm,setCatForm]=useState({name:"",color:PALETTE[0]});
const[editTaskForm,setEditTaskForm]=useState(null);
const[editRecurForm,setEditRecurForm]=useState(null);
const[editCatForm,setEditCatForm]=useState(null);
const timers=useRef([]);
useEffect(()=>{const iv=setInterval(()=>setNow(new Date()),30000);return()=>clearInterval(iv);},[]);
const saveAll=useCallback(async(t,r,c,pr,h,pend)=>{try{await window.storage.set("pwa_tasks",JSON.stringify(t));await window.storage.set("pwa_recur",JSON.stringify(r));await window.storage.set("pwa_cats",JSON.stringify(c));await window.storage.set("pwa_prof",JSON.stringify(pr));await window.storage.set("pwa_hist",JSON.stringify(h));await window.storage.set("pwa_pend",JSON.stringify(pend));}catch(e){}},[]);
const calcHist=useCallback((t,h)=>{const today=TODAY(),tt=t.filter(x=>x.date===today);return{...h,[today]:{total:tt.length,done:tt.filter(x=>x.done).length}};},[]);
const scheduleNotifs=useCallback((recur,prof)=>{timers.current.forEach(clearTimeout);timers.current=[];if(typeof Notification==="undefined"||Notification.permission!=="granted")return;const n=new Date(),wd=n.getDay();recur.forEach(r=>{if(!r.days.includes(wd))return;if(r.text.includes("agua")&&!prof?.notifWater)return;if((r.text==="Lanche"||r.text==="Almoco")&&!prof?.notifMeals)return;if(r.text.includes("Skin-care")&&!prof?.notifSkincare)return;const[hh,mm]=r.timeStart.split(":").map(Number);const t2=new Date();t2.setHours(hh,mm-5,0,0);const delay=t2-n;if(delay>0)timers.current.push(setTimeout(()=>new Notification("Lembrete: "+r.text,{body:"Em 5 minutos - "+r.timeStart}),delay));});},[]);
useEffect(()=>{(async()=>{try{const keys=["pwa_tasks","pwa_recur","pwa_cats","pwa_prof","pwa_hist","pwa_pend"];const res=await Promise.allSettled(keys.map(k=>window.storage.get(k)));const v=i=>res[i].value?.value?JSON.parse(res[i].value.value):null;const lt=v(0)||[],lr=v(1)||DEFAULT_RECURRING,lc=v(2)||DEFAULT_CATS,lpr=v(3)||{name:"",notifWater:true,notifMeals:true,notifSkincare:true},lh=v(4)||{},lpend=v(5)||[];const inj=injectRecurring(lt,lr),np=checkPending(inj,lpend),nh=calcHist(inj,lh);setTasks(inj);setRecurring(lr);setCategories(lc);setProfile(lpr);setHistory(nh);setPending(np);if(typeof Notification!=="undefined"){setNotifStatus(Notification.permission);if(Notification.permission==="granted")scheduleNotifs(lr,lpr);}if(inj.length!==lt.length||np.length!==lpend.length)saveAll(inj,lr,lc,lpr,nh,np);}catch(e){}setLoaded(true);})();return()=>timers.current.forEach(clearTimeout);},[]);
const commit=(nt=tasks,nr=recurring,nc=categories,npr=profile,npend=pending)=>{const nh=calcHist(nt,history);setTasks(nt);setHistory(nh);setRecurring(nr);setCategories(nc);setProfile(npr);setPending(npend);saveAll(nt,nr,nc,npr,nh,npend);};
const addTask=()=>{if(!taskForm.text.trim())return;commit([...tasks,{id:Date.now(),...taskForm,text:taskForm.text.trim(),done:false}]);setTaskForm(blankTask());setShowNewTask(false);};
const toggleTask=id=>commit(tasks.map(t=>t.id===id?{...t,done:!t.done}:t));
const saveEditTask=()=>{if(!editTaskForm?.text?.trim())return;commit(tasks.map(t=>t.id===editTaskId?{...t,...editTaskForm}:t));setEditTaskId(null);setEditTaskForm(null);};
const deleteTask=()=>{commit(tasks.filter(t=>t.id!==editTaskId));setEditTaskId(null);setEditTaskForm(null);};
const addRecur=()=>{if(!recurForm.text.trim())return;const nr=[...recurring,{id:"r"+Date.now(),...recurForm,text:recurForm.text.trim()}];commit(injectRecurring(tasks,nr),nr);setRecurForm({text:"",cat:"Trabalho",prio:"normal",timeStart:"09:00",timeEnd:"",days:[1,2,3,4,5],goesToPending:false});setShowNewRecur(false);scheduleNotifs(nr,profile);};
const saveEditRecur=()=>{if(!editRecurForm?.text?.trim())return;const nr=recurring.map(r=>r.id===editRecurId?{...r,...editRecurForm}:r);const nt=tasks.map(t=>t.recurId===editRecurId?{...t,...editRecurForm,id:t.id,date:t.date,done:t.done,recurId:t.recurId}:t);commit(nt,nr);setEditRecurId(null);setEditRecurForm(null);};
const deleteRecur=()=>{commit(tasks.filter(t=>t.recurId!==editRecurId),recurring.filter(r=>r.id!==editRecurId));setEditRecurId(null);setEditRecurForm(null);};
const addCat=()=>{if(!catForm.name.trim())return;const nc=[...categories,{id:"c"+Date.now(),name:catForm.name.trim(),color:catForm.color}];commit(tasks,recurring,nc);setCatForm({name:"",color:PALETTE[0]});setShowNewCat(false);};
